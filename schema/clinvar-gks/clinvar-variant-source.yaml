  #       description: >-
  #         The Clinvar HGVS type associated with the Clinvar variant. It must be one of the following:
  #         'genomic, top-level', 'genomic', 'coding', or 'non-coding'.

  ExtensionVrsPreProcessingIssue:
    type: object
    maturity: draft
    description: >-
      Issues detected during VRS pre-processing of the variation's input expressions. Present only 
      when issues exist. May contain multiple issues separated by newlines
    protectedClassOf: ClinvarCategoricalVariant
    properties:
      name:
        type: string
        const: vrsPreProcessingIssue
        description: >-
          Must be 'vrsPreProcessingIssue'.
      value:
        type: string
        description: >-
          The VRS processing errors associated with the Clinvar variant.

  ExtensionsVrsProcessingException:
    type: object
    maturity: draft
    description: >-
      Errors returned by the external VRS Python processing service. Present only when 
      errors occurred during VRS resolution.
    protectedClassOf: ClinvarCategoricalVariant
    properties:
      name:
        type: string
        const: vrsProcessingException
        description: >-
          Must be 'vrsProcessingException'.
      value:
        type: string
        description: >-
          The VRS processing errors associated with the Clinvar variant.

  ClinvarSequenceReferenceProperties:
    type: object
    maturity: draft
    description: >
      The GA4GH Sequence Reference Representation(SR) profile specific to Clinvar.
    protectedClassOf: ClinvarCategoricalVariation
    properties:
      extensions:
        type: array
        items:
          oneOf:
            - $ref: "#/$defs/ExtensionAssembly"
    additionalProperties: true

  ClinvarSequenceReference:
    maturity: draft
    description: >
      The GA4GH Sequence Reference Representation(SR) profile specific to Clinvar.
    protectedClassOf: ClinvarCategoricalVariation
    allOf:
      - $ref: "/ga4gh/schema/vrs/2.0.1/json/SequenceReference"
      - $ref: "#/$defs/ClinvarSequenceReferenceProperties"

  ClinvarSequenceLocationProperties:
    type: object
    maturity: draft
    description: >-
      The GA4GH Sequence Location Representation(SL) profile specific to Clinvar.
    protectedClassOf: ClinvarCategoricalVariation
    properties:
      sequenceReference:
        oneOf:
          - $ref: "/ga4gh/schema/gks-core/1.1.0/json/iriReference"
          - $ref: "#/$defs/ClinvarSequenceReference"
        description: >-
          The reference sequence for the location.
      extensions:
        type: 
        ordered: false
        maxItems: 0
    additionalProperties: true

  ClinvarSequenceLocation:
    maturity: draft
    description: >
      The GA4GH Sequence Location Representation(SL) profile specific to Clinvar.
    protectedClassOf: ClinvarCategoricalVariation
    allOf:
      - $ref: "/ga4gh/schema/vrs/2.0.1/json/SequenceLocation"
      - $ref: "#/$defs/ClinvarSequenceLocationProperties"

  ClinvarAlleleProperties:
    description: >-
      The GA4GH Allele Representation(AR) profile specific to Clinvar.
    protectedClassOf: ClinvarCategoricalVariation
    type: object
    maturity: draft
    properties:
      location:
        oneOf:
          - $ref: "/ga4gh/schema/gks-core/1.1.0/json/iriReference"
          - $ref: "#/$defs/ClinvarSequenceLocation"
        description: >-
          The location of the variant.
      # extensions:
      #   type: array
      #   ordered: false
      #   items:
      #     oneOf:
      #       - $ref: "#/$defs/ExtensionClinvarVcf"
      #       - $ref: "#/$defs/ExtensionClinvarHgvsType"
        # description: >-
        #   A list of extensions to the entity. Extensions are not expected to be natively understood,
        #   but may be used for pre-negotiated exchange of message attributes between systems.
    additionalProperties: true

  ClinvarAllele:
    maturity: draft
    description: >-
      The GA4GH Allele Representation(AR) profile specific to Clinvar.
    protectedClassOf: ClinvarCategoricalVariation
    allOf:
      - $ref: "/ga4gh/schema/vrs/2.0.1/json/Allele"
      - $ref: "#/$defs/ClinvarAlleleProperties"

  ClinvarCanonicalAlleleProperties:
    type: object
    maturity: draft
    description: >-
      The GA4GH Canonical Allele Representation profile specific to Clinvar.
    protectedClassOf: ClinvarCategoricalVariation
    properties:
      definingContext:
        oneOf:
          - $ref: "/ga4gh/schema/gks-core/1.1.0/json/iriReference"
          - $ref: "#/$defs/ClinvarAllele"
      members:
        type: array
        ordered: false
        description: >-
          A non-exhaustive list of VRS variation contexts that satisfy the constraints of
          this categorical variant.
        items:
          oneOf:
            - $ref: "/ga4gh/schema/gks-core/1.1.0/json/iriReference"
            - $ref: "#/$defs/ClinvarAllele"
    additionalProperties: true

  ClinvarCategoricalVariantProperties:
    description: >-
      A variant in Clinvar, which may be associated with multiple statements.
    protectedClassOf: ClinvarCategoricalVariant
    type: object
    maturity: draft
    properties:
      extensions:
        type: array
        ordered: false
        items:
          oneOf:
            - $ref: "#/$defs/ExtensionClinvarHgvsList"
            - $ref: "#/$defs/ExtensionClinvarGeneList"
            - $ref: "#/$defs/ExtensionCategoricalVariationType"
            - $ref: "#/$defs/ExtensionDefiningVrsVariationType"
            - $ref: "#/$defs/ExtensionClinvarVariationType"
            - $ref: "#/$defs/ExtensionClinvarSubclassType"
            - $ref: "#/$defs/ExtensionClinvarCytogeneticLocation"
            - $ref: "#/$defs/ExtensionVrsPreProcessingIssue"
            - $ref: "#/$defs/ExtensionsVrsProcessingException"
        description: >-
          A list of extensions to the entity. Extensions are not expected to be natively understood,
          but may be used for pre-negotiated exchange of message attributes between systems.
    additionalProperties: true

  ClinvarCanonicalAllele:
    maturity: draft
    description: >
      The GA4GH Allele Representation(AR) profile specific to Clinvar.
    protectedClassOf: ClinvarCategoricalVariant
    allOf:
      - $ref: "/ga4gh/schema/cat-vrs/1.0.0/json/CanonicalAllele"
      - $ref: "#/$defs/ClinvarCanonicalAlleleProperties" 
      - $ref: "#/$defs/ClinvarCategoricalVariantProperties"

  ClinvarCategoricalCnvChange:
    maturity: draft
    description: >-
      The Clinvar specific representations of described variants.
    protectedClassOf: ClinvarCategoricalVariant
    allOf:
      - $ref: "/ga4gh/schema/cat-vrs/1.0.0/json/CategoricalCnv"
      # - $ref: "#/$defs/ClinvarCategoricalCnvProperties" 
      - $ref: "#/$defs/ClinvarCategoricalVariantProperties"

  ClinvarCategoricalCnvCount:
    maturity: draft
    description: >-
      The Clinvar specific representations of described variants.
    protectedClassOf: ClinvarCategoricalVariant
    allOf:
      - $ref: "/ga4gh/schema/cat-vrs/1.0.0/json/CategoricalCnv"
      # - $ref: "#/$defs/ClinvarCategoricalCnvProperties" 
      - $ref: "#/$defs/ClinvarCategoricalVariantProperties"

  ClinvarNonConstrainedVariant:
    maturity: draft
    description: >-
      The Clinvar specific representations of described variants.
    protectedClassOf: ClinvarCategoricalVariant
    allOf:
      - $ref: "/ga4gh/schema/cat-vrs/1.0.0/json/CategoricalVariant"
      # - $ref: "#/$defs/ClinvarDescribedVariationProperties" 
      - $ref: "#/$defs/ClinvarCategoricalVariantProperties"

  ClinvarCategoricalVariant:
    maturity: draft
    description: >-
      The Clinvar specific representations of categorical variants.
    oneOf:
      - $ref: "#/$defs/ClinvarCanonicalAllele"
      - $ref: "#/$defs/ClinvarCategoricalCnvChange"
      - $ref: "#/$defs/ClinvarCategoricalCnvCount"
      - $ref: "#/$defs/ClinvarNonConstrainedVariant"