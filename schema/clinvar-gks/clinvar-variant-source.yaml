  #         '17', '18', '19', '20', '21', '22', 'X', 'Y', or 'MT'.

  ExtensionClinvarCytogeneticLocation:
    description: >-
      The cytogenetic band location of the variation (e.g., 1p36.22, 17q21.31). Present when 
      ClinVar provides a cytogenetic location.
    protectedClassOf: ClinvarCategoricalVariant
    type: object
    maturity: draft
    properties:
      name:
        type: string
        const: clinvarCytogeneticLocation
        description: >-
          Must be 'clinvarCytogeneticLocation'.
      value:
        type: string
        description: >-
          The cytogenetic location of the variant as provided by Clinvar.

  ExtensionAssembly:
    description: >-
      An extension item for the assembly associated with a Clinvar variant.
    protectedClassOf: ClinvarCategoricalVariant
    type: object
    maturity: draft
    properties:
      name:
        type: string
        const: assembly8
        description: >-
          Must be 'assembly'.
      value:
        type: string
        enum: ["GRCh37","GRCh38","NCBI36"]
        description: >-
          The assembly of the variant as provided by Clinvar. It must be one of the following:
          'GRCh37', 'GRCh38', or 'NCBI36'.

  # ExtensionClinvarVcf:
  #   type: object
  #   maturity: draft
  #   description: >-
  #     An extension item for the Clinvar VCF value associated with a Clinvar variant.
  #   protectedClassOf: ClinvarCategoricalVariant
  #   properties:
  #     name:
  #       type: string
  #       const: clinvarVcf
  #       description: >-
  #         Must be 'clinvarVcf'.
  #     value:
  #       type: string
  #       description: >-
  #         The Clinvar VCF value associated with the Clinvar variant.

  # ExtensionClinvarHgvsType:
  #   type: object
  #   maturity: draft
  #   description: >-
  #     An extension item for the Clinvar HGVS type associated with a Clinvar variant.
  #   protectedClassOf: ClinvarCategoricalVariant
  #   properties:
  #     name:
  #       type: string
