$schema: "https://json-schema.org/draft/2020-12/schema"
$id: "https://w3id.org/ga4gh/schema/clinvar-gks/1.x/clinvar-gks/clinvar-statement-source.yaml"
title: ClinVar-GKS statement profiles
description: >-
  Profiles of the VA-Spec Statement type for ClinVar SCV (submission-level),
  VCV (variant-level aggregate), and RCV (condition-level aggregate) statements.
  Each profile constrains the base Statement with ClinVar-specific extensions
  and specifies the allowable proposition types at each level.
strict: true

imports:
  va-core: ../va-spec/base/va-core-source.yaml
  domain-entities: ../va-spec/base/domain-entities-source.yaml
  clinvar-proposition: ./clinvar-proposition-source.yaml
  clinvar-evidence: ./clinvar-evidence-source.yaml
  cat-vrs: ../cat-vrs/cat-vrs-source.yaml
  vrs: ../vrs/vrs-source.yaml
  gks-core: ../gks-core/gks-core-source.yaml

namespaces:
  gks.core: /ga4gh/schema/gks-core/1.1.0/json/
  vrs: /ga4gh/schema/vrs/2.0.1/json/
  cat-vrs: /ga4gh/schema/cat-vrs/1.0.0/json/
  va-spec: /ga4gh/schema/va-spec/1.0.1/base/json/
  clinvar-gks: /ga4gh/schema/clinvar-gks/1.x/clinvar-gks/json/

$defs:
  # ─── SCV Extension Types ───

  ExtensionClinvarScvId:
    type: object
    maturity: draft
    description: >-
      The SCV accession identifier without version (e.g., SCV001571657).
    protectedClassOf: ClinvarScvStatement
    properties:
      name:
        type: string
        const: clinvarScvId
        description: Must be 'clinvarScvId'.
      value:
        type: string
        description: The SCV accession identifier without version suffix.

  ExtensionClinvarScvVersion:
    type: object
    maturity: draft
    description: >-
      The version number of the SCV submission (e.g., "2").
    protectedClassOf: ClinvarScvStatement
    properties:
      name:
        type: string
        const: clinvarScvVersion
        description: Must be 'clinvarScvVersion'.
      value:
        type: string
        description: The version number as a string.

  ExtensionClinvarScvReviewStatus:
    type: object
    maturity: draft
    description: >-
      The review status of the individual SCV submission as reported by ClinVar
      (e.g., "criteria provided, single submitter", "no assertion criteria provided").
    protectedClassOf: ClinvarScvStatement
    properties:
      name:
        type: string
        const: clinvarScvReviewStatus
        description: Must be 'clinvarScvReviewStatus'.
      value:
        type: string
        enum:
          - "criteria provided, single submitter"
          - "criteria provided, conflicting classifications"
          - "criteria provided, multiple submitters, no conflicts"
          - "no assertion criteria provided"
          - "no classification provided"
          - "no assertion provided"
          - "practice guideline"
          - "reviewed by expert panel"
        description: >-
          The ClinVar review status for the submission.

  ExtensionSubmittedScvLocalKey:
    type: object
    maturity: draft
    description: >-
      The local key submitted by the submitter for this SCV, typically a combination
      of variant and condition identifiers used internally by the submitting lab.
    protectedClassOf: ClinvarScvStatement
    properties:
      name:
        type: string
        const: submittedScvLocalKey
        description: Must be 'submittedScvLocalKey'.
      value:
        type: string
        description: The submitter's local key string.

  ExtensionSubmissionLevel:
    type: object
    maturity: draft
    description: >-
      The submission level category based on review status. Determines the
      aggregation tier when building VCV and RCV aggregate statements.
    protectedClassOf: ClinvarScvStatement
    properties:
      name:
        type: string
        const: submissionLevel
        description: Must be 'submissionLevel'.
      value:
        type: string
        enum:
          - "PG"
          - "EP"
          - "CP"
          - "NOCP"
        description: >-
          Practice Guideline (PG), Expert Panel (EP), Criteria Provided (CP),
          or No Criteria Provided (NOCP).

  ExtensionSubmittedScvClassification:
    type: object
    maturity: draft
    description: >-
      The original classification label as submitted by the submitter, before
      any normalization. Present when the submitted classification differs
      from the normalized classification.
    protectedClassOf: ClinvarScvStatement
    properties:
      name:
        type: string
        const: submittedScvClassification
        description: Must be 'submittedScvClassification'.
      value:
        type: string
        description: The original submitted classification string.

  # ─── Submitted Condition Types ───
  # These extensions appear on both SCV statements and somatic evidence lines.
  # They capture the submitter's original condition information and how it was
  # mapped/normalized to the ClinVar canonical condition.

  SubmittedConditionMapping:
    type: object
    maturity: draft
    description: >-
      The submitter's original condition details and how they were mapped to
      a ClinVar canonical condition. Includes the submitted name, type, MedGen
      ID, cross-references, and the normalization path (direct match,
      original medgen match, normalized match, resolution type, mapping details).
    properties:
      id:
        type: string
        description: >-
          The submitted trait category assignment identifier (cat_id).
      name:
        type: string
        description: >-
          The condition name as submitted by the submitter.
      type:
        type: string
        description: >-
          The condition type as submitted (e.g., "Disease", "Finding").
      medgen_id:
        type: string
        description: >-
          The MedGen ID submitted by the submitter, if provided.
      xrefs:
        type: array
        ordered: false
        items:
          $refCurie: gks.core:Coding
        description: >-
          Cross-references submitted by the submitter for this condition.
      original_medgen_match:
        type: object
        additionalProperties: false
        description: >-
          The original MedGen match when the submitted MedGen ID was remapped
          to a different canonical MedGen concept. Contains id and name of the
          original match. Null when no remapping occurred.
        properties:
          id:
            type: string
          name:
            type: string
      direct_match:
        type: string
        description: >-
          JSON pointer reference to the directly matched condition
          (e.g., "#/condition/clinvar.trait:123"). Present only when the
          direct match differs from the normalized match.
      normalized_match:
        type: string
        description: >-
          JSON pointer reference to the final normalized condition
          (e.g., "#/condition/clinvar.trait:456").
      normalized_resolution:
        type: string
        description: >-
          How the condition normalization was resolved (e.g., "rcv-tm medgen id",
          "rcv-tm preferred name", "random trait assignment").
      mapping:
        type: object
        additionalProperties: false
        description: >-
          The mapping details used to resolve the submitted condition to a
          ClinVar trait, including mapping type, reference field, and value.
        properties:
          type:
            type: string
          ref:
            type: string
          value:
            type: string

  ExtensionSubmittedCondition:
    type: object
    maturity: draft
    description: >-
      The submitter's original condition for single-condition submissions.
      Contains the submitted condition details and how they were mapped to
      the ClinVar canonical condition. Present on SCV statements and somatic
      evidence lines when the submission has exactly one condition.
    protectedClassOf: ClinvarScvStatement
    properties:
      name:
        type: string
        const: submittedCondition
        description: Must be 'submittedCondition'.
      value:
        type: object
        description: >-
          The submitted condition mapping details. Includes a reference to
          the resolved condition and the full mapping provenance.
        properties:
          condition:
            type: string
            description: >-
              JSON pointer reference to the resolved condition
              (e.g., "#/condition/clinvar.trait:123").
          conditionSet:
            type: string
            description: >-
              Always null for single-condition submissions. Present for
              structural consistency with submittedConditionSet.
        additionalProperties: true

  ExtensionSubmittedConditionSet:
    type: object
    maturity: draft
    description: >-
      The submitter's original conditions for multi-condition submissions.
      Contains the submitted condition set details, the multiple condition
      explanation (AND/OR), and an array of individual condition mappings.
      Present on SCV statements and somatic evidence lines when the
      submission has two or more conditions.
    protectedClassOf: ClinvarScvStatement
    properties:
      name:
        type: string
        const: submittedConditionSet
        description: Must be 'submittedConditionSet'.
      value:
        type: object
        description: >-
          The submitted condition set with mapping details for each condition.
        properties:
          conditionSet:
            type: string
            description: >-
              JSON pointer reference to the resolved condition set
              (e.g., "#/conditionSet/clinvar.traitset:123").
          condition:
            type: string
            description: >-
              Always null for multi-condition submissions. Present for
              structural consistency with submittedCondition.
          multiple_condition_explanation:
            type: string
            description: >-
              ClinVar's explanation for how multiple conditions relate
              (maps to the ConditionSet membership operator: AND or OR).
          concepts:
            type: array
            ordered: true
            items:
              $ref: "#/$defs/SubmittedConditionMapping"
            description: >-
              Array of individual submitted condition mappings, one per
              condition in the set. Ordered by the condition's cat_id suffix.
        additionalProperties: true

  # ─── VCV/RCV Extension Types ───

  ExtensionClinvarReviewStatus:
    type: object
    maturity: draft
    description: >-
      The aggregate review status for a VCV or RCV statement. Reflects the
      highest review status among contributing submissions (e.g., "practice
      guideline", "reviewed by expert panel", "criteria provided, multiple
      submitters, no conflicts").
    protectedClassOf: ClinvarAggregateStatement
    properties:
      name:
        type: string
        const: clinvarReviewStatus
        description: Must be 'clinvarReviewStatus'.
      value:
        type: string
        enum:
          - "practice guideline"
          - "reviewed by expert panel"
          - "criteria provided, conflicting classifications"
          - "criteria provided, multiple submitters, no conflicts"
          - "criteria provided, single submitter"
          - "no assertion criteria provided"
          - "no classification provided"
          - "no assertion provided"
        description: The aggregate review status.

  # ─── Statement Profiles ───

  ClinvarScvStatementProperties:
    type: object
    maturity: draft
    description: >-
      ClinVar-specific properties for SCV (submission-level) statements.
    protectedClassOf: ClinvarScvStatement
    properties:
      proposition:
        description: >-
          The proposition assessed by this SCV statement. Must be one of the
          GA4GH standard proposition types (pathogenicity, oncogenicity,
          clinical significance) or a ClinVar-specific proposition type
          (risk factor, protective, drug response, affects, association,
          confers sensitivity, other, not provided, conflicting data).
        oneOf:
          - $ref: ClinvarProposition
          - $refCurie: gks.core:iriReference
      hasEvidenceLines:
        type: array
        ordered: false
        items:
          anyOf:
            - $ref: ClinvarSomaticEvidenceLine
            - $refCurie: va-spec:EvidenceLine
            - $refCurie: gks.core:iriReference
        description: >-
          Evidence lines for this SCV statement. For somatic clinical impact
          (SCI) statements, evidence lines carry target propositions
          (VariantTherapeuticResponseProposition, VariantDiagnosticProposition,
          or VariantPrognosticProposition) and an evidence outcome reflecting
          the AMP/ASCO/CAP tier. Germline and oncogenicity SCVs typically
          do not have evidence lines.
      extensions:
        type: array
        ordered: false
        items:
          oneOf:
            - $ref: "#/$defs/ExtensionClinvarScvId"
            - $ref: "#/$defs/ExtensionClinvarScvVersion"
            - $ref: "#/$defs/ExtensionClinvarScvReviewStatus"
            - $ref: "#/$defs/ExtensionSubmittedScvLocalKey"
            - $ref: "#/$defs/ExtensionSubmissionLevel"
            - $ref: "#/$defs/ExtensionSubmittedScvClassification"
            - $ref: "#/$defs/ExtensionSubmittedCondition"
            - $ref: "#/$defs/ExtensionSubmittedConditionSet"
        description: >-
          SCV-level extensions including submission metadata, review status,
          and the submitter's original condition mapping.
    additionalProperties: true

  ClinvarScvStatement:
    maturity: draft
    description: >-
      A ClinVar SCV (submitted clinical variant) statement. Represents a single
      submitter's assertion about a variant-condition relationship, including
      their classification, direction, strength, method, and contributions.

      Allowable proposition types at SCV level:

      Germline classification (9 types): VariantPathogenicityProposition,
      ClinvarRiskFactorProposition, ClinvarProtectiveProposition,
      ClinvarDrugResponseProposition, ClinvarAffectsProposition,
      ClinvarAssociationProposition, ClinvarConfersSensitivityProposition,
      ClinvarOtherProposition, ClinvarNotProvidedProposition.

      Oncogenicity (1 type): VariantOncogenicityProposition.

      Somatic clinical impact (1 type): VariantClinicalSignificanceProposition
      with evidence lines carrying VariantTherapeuticResponseProposition,
      VariantDiagnosticProposition, or VariantPrognosticProposition.

      Conflicting data (1 type): ClinvarConflictingDataFromSubmitterProposition.
    allOf:
      - $refCurie: va-spec:Statement
      - $ref: "#/$defs/ClinvarScvStatementProperties"

  ClinvarAggregateStatementProperties:
    type: object
    maturity: draft
    description: >-
      ClinVar-specific properties for aggregate (VCV and RCV) statements.
    protectedClassOf: ClinvarAggregateStatement
    properties:
      proposition:
        description: >-
          The aggregate proposition assessed by this VCV or RCV statement.
          Uses the same proposition types as SCV statements. The proposition
          at the aggregate level represents the consensus or highest-priority
          classification across contributing submissions.
        oneOf:
          - $ref: ClinvarProposition
          - $refCurie: gks.core:iriReference
      hasEvidenceLines:
        type: array
        ordered: false
        items:
          anyOf:
            - $refCurie: va-spec:EvidenceLine
            - $refCurie: gks.core:iriReference
        description: >-
          Evidence lines grouping contributing submissions by review status
          priority tier. Each evidence line contains nested sub-statements
          (classification layer) or SCV references (aggregate contribution
          layer). Tiers are: practice guideline (PG), expert panel (EP),
          criteria provided (CP), and no criteria provided (NOCP).
      extensions:
        type: array
        ordered: false
        items:
          oneOf:
            - $ref: "#/$defs/ExtensionClinvarReviewStatus"
        description: >-
          Aggregate-level extensions including the overall review status.
    additionalProperties: true

  ClinvarVcvStatement:
    maturity: draft
    description: >-
      A ClinVar VCV (variant classification variant) statement. Represents an
      aggregate classification for a variant across all submissions sharing
      the same proposition type. VCV statements contain evidence lines that
      group contributing SCV submissions by review status priority tier
      (practice guideline, expert panel, criteria provided, no criteria provided).

      VCV statements use the same 12 proposition types as SCV statements.
      Evidence lines at the VCV level contain nested sub-statements at the
      classification layer, each carrying the same proposition type as the
      parent but scoped to a specific priority tier. The innermost layer
      references individual SCV submissions as evidence items.
    allOf:
      - $refCurie: va-spec:Statement
      - $ref: "#/$defs/ClinvarAggregateStatementProperties"

  ClinvarRcvStatement:
    maturity: draft
    description: >-
      A ClinVar RCV (reference clinical variant) statement. Represents an
      aggregate classification for a specific variant-condition pair across
      all submissions sharing the same proposition type and condition. RCV
      statements contain evidence lines that group contributing SCV submissions
      by review status priority tier, scoped to a single condition or condition set.

      RCV statements use the same 12 proposition types as SCV statements.
      Unlike VCV statements which aggregate across all conditions for a variant,
      RCV statements are scoped to a single condition. Evidence lines at the
      RCV level follow the same priority tier structure as VCV statements.
    allOf:
      - $refCurie: va-spec:Statement
      - $ref: "#/$defs/ClinvarAggregateStatementProperties"

  ClinvarStatement:
    maturity: draft
    description: >-
      Any ClinVar statement, at either the submission (SCV) or aggregate
      (VCV, RCV) level.
    oneOf:
      - $ref: "#/$defs/ClinvarScvStatement"
      - $ref: "#/$defs/ClinvarVcvStatement"
      - $ref: "#/$defs/ClinvarRcvStatement"
